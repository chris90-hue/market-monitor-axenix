name: Weekly Market Monitor

on:
  schedule:
    # Запускается каждый понедельник в 09:00 UTC (это 12:00 по московскому времени)
    - cron: '0 9 * * 1'
  # Позволяет запустить вручную из GitHub Actions интерфейса
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Run market monitor
        run: python market_monitor.py
      
      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/companies_data.json
          git commit -m "📊 Update market monitoring data - $(date '+%Y-%m-%d %H:%M')" || true
          git push origin main
