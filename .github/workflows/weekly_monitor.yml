name: Weekly Market Monitor + Article Suggestions

on:
  schedule:
    # Запускается каждый понедельник в 09:00 UTC (12:00 по московскому времени)
    - cron: '0 9 * * 1'
  # Позволяет запустить вручную из GitHub Actions интерфейса
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests anthropic
      
      - name: Create data directory
        run: mkdir -p data suggestions
      
      - name: Run market monitor
        run: python scripts/market_monitor.py
      
      - name: Generate article suggestions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/article_suggestions.py
      
      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/companies_data.json
          git add suggestions/
          git commit -m "📊 Update market data & 📝 Generate article suggestions - $(date '+%Y-%m-%d %H:%M')" || true
          git push origin main
